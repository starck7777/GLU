{% extends 'base.html' %}
{% block title %}Profile | GluCare{% endblock %}
{% block content %}
<section class="card">
    <h2>Profile</h2>
    <p>Maintain your personal details and emergency caretaker contact.</p>
    <form method="post" class="form-grid two">
        <label>Full Name
            <input type="text" name="full_name" value="{{ g.user.full_name }}">
        </label>
        <label>Age
            <input type="number" name="age" min="0" value="{{ g.user.age }}">
        </label>
        <label>Weight (kg)
            <input type="number" name="weight" step="0.1" min="0" value="{{ g.user.weight }}">
        </label>
        <label>Caretaker Name
            <input type="text" name="caretaker_name" value="{{ g.user.caretaker_name }}">
        </label>
        <label>Caretaker Phone
            <input type="text" name="caretaker_phone" value="{{ g.user.caretaker_phone }}">
        </label>
        <label>Caretaker Email
            <input type="email" name="caretaker_email" value="{{ g.user.caretaker_email }}">
        </label>
        <button type="submit">Update Profile</button>
    </form>
</section>
{% endblock %}
