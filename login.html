{% extends 'base.html' %}
{% block title %}Login | GluCare{% endblock %}
{% block content %}
<section class="auth-wrap">
    <div class="card auth-card">
        <h2>Login</h2>
        <p>Access your daily diabetes care dashboard.</p>
        <form method="post" class="form-grid">
            <label>Username
                <input type="text" name="username" required />
            </label>
            <label>Password
                <input type="password" name="password" required />
            </label>
            <button type="submit">Sign In</button>
        </form>
        <p class="meta">No account? <a href="{{ url_for('register') }}">Create one</a>.</p>
    </div>
</section>
{% endblock %}
